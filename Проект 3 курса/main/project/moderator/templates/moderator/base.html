<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель модератора</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .header { background: #2c3e50; color: white; padding: 10px 20px; overflow: hidden; }
        .header a { color: white; text-decoration: none; }
        .header .user-info { float: left; }
        .header .logout { float: right; }
        .nav { background: #34495e; padding: 10px 20px; }
        .nav a { color: white; margin-right: 20px; text-decoration: none; padding: 5px 10px; }
        .nav a:hover { background: #2c3e50; border-radius: 3px; }
        .content { padding: 20px; }
        .messages { list-style: none; padding: 0; margin: 20px; }
        .messages li { padding: 10px; margin-bottom: 10px; border-radius: 3px; }
        .messages .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .messages .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .messages .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    </style>
</head>
<body>
    <div class="header">
        <span class="user-info">Добро пожаловать, {{ user.moderator_profile.full_name }}!</span>
        <a href="{% url 'moderator:logout' %}" class="logout">Выйти</a>
    </div>

    <div class="nav">
        <a href="{% url 'moderator:panel' %}">Главная</a>
        <a href="{% url 'moderator:question_list' %}">Вопросы</a>
        <a href="{% url 'moderator:team_list' %}">Команды</a>
        <a href="{% url 'moderator:gamesession_list' %}">Игровые сессии</a>
    </div>

    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
        <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}

    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
