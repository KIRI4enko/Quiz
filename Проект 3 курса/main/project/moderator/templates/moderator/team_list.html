{% extends "moderator/base.html" %}

{% block content %}
<h1>Команды</h1>
<a href="{% url 'moderator:team_create' %}">+ Добавить команду</a>
<table border="1" cellpadding="8">
    <thead>
        <tr>
            <th>Название</th>
            <th>Пароль</th>
            <th>Цвет</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for team in teams %}
        <tr style="background-color: {{ team.color }}20;">
            <td>{{ team.name }}</td>
            <td>{{ team.password }}</td>
            <td><span style="display:inline-block; width:20px; height:20px; background:{{ team.color }};"></span> {{ team.color }}</td>
            <td>
                <a href="{% url 'moderator:team_edit' team.pk %}">Редактировать</a>
                <a href="{% url 'moderator:team_delete' team.pk %}">Удалить</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="4">Нет команд</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
