<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход для модератора</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Вход в панель модератора</h1>
    {% if form.errors %}
        <p class="error">Неверное имя пользователя или пароль.</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Войти</button>
    </form>
</body>
</html>
